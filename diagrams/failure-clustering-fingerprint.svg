<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="fcArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#667085"/>
    </marker>
    <marker id="fcArrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#4353ff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="400" rx="12" fill="#fcfcfd" stroke="#e4e7ec"/>
  <text x="24" y="36" font-size="16" font-weight="700" fill="#101828">Fingerprinting — every failure, zero configuration</text>
  <text x="24" y="56" font-size="12.5" fill="#475467">The error text is normalized and hashed; the hash routes each failure to its cluster.</text>

  <!-- Raw error -->
  <rect x="24" y="84" width="270" height="150" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
  <rect x="24" y="84" width="270" height="30" rx="8" fill="#f2f4f7"/>
  <rect x="24" y="106" width="270" height="8" fill="#f2f4f7"/>
  <text x="40" y="104" font-size="13" font-weight="600" fill="#344054">Raw error text</text>
  <g font-family="ui-monospace, monospace" font-size="11.5" fill="#344054">
    <text x="40" y="136">TimeoutError: locator.click:</text>
    <text x="40" y="154">Timeout <tspan fill="#b54708">30000</tspan>ms exceeded</text>
    <text x="40" y="172">waiting for getByRole('row',</text>
    <text x="40" y="190">  { name: <tspan fill="#b54708">'Acme Corp'</tspan> })</text>
  </g>
  <text x="40" y="216" font-size="11" fill="#667085">at checkout.spec.ts:42:11</text>
  <line x1="294" y1="160" x2="342" y2="160" stroke="#4353ff" stroke-width="1.6" marker-end="url(#fcArrAccent)"/>
  <text x="318" y="150" font-size="11" fill="#4353ff" text-anchor="middle">normalize</text>

  <!-- Fingerprint input -->
  <rect x="344" y="84" width="258" height="190" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
  <rect x="344" y="84" width="258" height="30" rx="8" fill="#f2f4f7"/>
  <rect x="344" y="106" width="258" height="8" fill="#f2f4f7"/>
  <text x="360" y="104" font-size="13" font-weight="600" fill="#344054">Fingerprint input</text>
  <rect x="360" y="124" width="64" height="20" rx="10" fill="#eef1ff" stroke="#c7ceff"/>
  <text x="392" y="138" font-size="11" font-weight="600" fill="#2a3aa8" text-anchor="middle">timeout</text>
  <text x="434" y="138" font-size="11" fill="#667085">error category</text>
  <g font-family="ui-monospace, monospace" font-size="11.5" fill="#344054">
    <text x="360" y="166">Timeout <tspan fill="#4353ff">&lt;N&gt;</tspan>ms exceeded</text>
    <text x="360" y="184">waiting for getByRole('row',</text>
    <text x="360" y="202">  { name: <tspan fill="#4353ff">&lt;STR&gt;</tspan> })</text>
  </g>
  <line x1="360" y1="222" x2="586" y2="222" stroke="#e4e7ec"/>
  <text x="360" y="244" font-size="11" fill="#667085">stack frame kept for display — never hashed,</text>
  <text x="360" y="259" font-size="11" fill="#667085">so one cause groups across spec files</text>
  <line x1="602" y1="160" x2="650" y2="160" stroke="#4353ff" stroke-width="1.6" marker-end="url(#fcArrAccent)"/>
  <text x="626" y="150" font-size="11" fill="#4353ff" text-anchor="middle">SHA-256</text>

  <!-- Cluster -->
  <rect x="652" y="84" width="244" height="150" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
  <rect x="652" y="84" width="244" height="30" rx="8" fill="#f2f4f7"/>
  <rect x="652" y="106" width="244" height="8" fill="#f2f4f7"/>
  <text x="668" y="104" font-size="13" font-weight="600" fill="#344054">Failure cluster</text>
  <text x="668" y="136" font-size="11.5" font-family="ui-monospace, monospace" fill="#344054">fingerprint 3f9c1a…</text>
  <text x="668" y="160" font-size="12" fill="#475467">Same hash — or a recorded</text>
  <text x="668" y="178" font-size="12" fill="#475467">merge alias — joins the same</text>
  <text x="668" y="196" font-size="12" fill="#475467">cluster across tests, spec</text>
  <text x="668" y="214" font-size="12" fill="#475467">files and runs.</text>

  <!-- Storage -->
  <line x1="774" y1="234" x2="774" y2="262" stroke="#667085" stroke-width="1.4" marker-end="url(#fcArr)"/>
  <path d="M 656 284 a 118 16 0 0 0 236 0 v 56 a 118 16 0 0 1 -236 0 z" fill="#ffffff" stroke="#d0d5dd"/>
  <ellipse cx="774" cy="284" rx="118" ry="16" fill="#f2f4f7" stroke="#d0d5dd"/>
  <text x="774" y="320" font-size="13" font-weight="600" fill="#344054" text-anchor="middle">failure_clusters</text>
  <text x="774" y="338" font-size="11.5" fill="#667085" text-anchor="middle">one row per (project, fingerprint)</text>
  <text x="774" y="353" font-size="11.5" fill="#667085" text-anchor="middle">aliases reroute merged fingerprints</text>

  <!-- Masked tokens -->
  <text x="24" y="316" font-size="12" font-weight="700" fill="#667085" letter-spacing="0.4">MASKED BEFORE HASHING</text>
  <text x="24" y="338" font-size="11.5" fill="#475467">numbers &amp; timeouts · URLs · emails · UUIDs · hex hashes · expected/received values</text>
  <text x="24" y="354" font-size="11.5" fill="#475467">dynamic locator options ({ name: … }) — the locator's own target stays, so it still discriminates</text>
</svg>
